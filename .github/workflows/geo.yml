name: Update GeoJSON Boundaries

on:
  workflow_dispatch:

jobs:
  update-geojson:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run GeoJSON Scraper Script
        run: python get_geojson.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          git add data/melbourne_suburb_boundaries.geojson

          if git diff --staged --quiet; then
            echo "No new boundaries to commit."
          else
            git commit -m "Auto-update: Melbourne Suburb Boundaries [skip ci]"
            git pull --rebase
            git push
          fi