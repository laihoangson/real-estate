name: Melbourne Property - Scrape + Enrich

permissions:
  contents: write

on:
  schedule:
    - cron: "0 14 * * 6"   # Saturday 14:00 UTC = Sunday 00:00/01:00 Melbourne (AEST/AEDT)
  workflow_dispatch:

env:
  SCRAPE_FILE:  data/melbourne_price_data.csv
  ENRICH_FILE:  data/melbourne_price_data_enriched.csv

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Scrape domain.com.au using Camoufox (stealth Firefox)
  # ──────────────────────────────────────────────
  scrape:
    name: 1 - Scrape domain.com.au
    runs-on: ubuntu-latest
    timeout-minutes: 180   # Camoufox ~1.5–2h for full 196-cell grid

    env:
      HEADLESS: "true"                            # CI has no display
      PROXY_URL: ${{ secrets.PROXY_URL }}         # optional residential proxy
      # Xvfb display for any GUI code paths
      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Xvfb system dependencies
        # Camoufox bundles its own Firefox binary, but Ubuntu still needs the
        # shared libraries Firefox links against, plus Xvfb for headless mode
        # (Camoufox uses a virtual display even when headless=true).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 libdbus-glib-1-2 libxt6 \
            libasound2t64 libpangocairo-1.0-0 libxss1 \
            libnss3 libxtst6 libxrandr2 libdrm2 libgbm1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "camoufox[geoip]" pandas beautifulsoup4 numpy playwright

      - name: Cache Camoufox binary
        # Camoufox downloads ~150MB Firefox build the first time; cache it.
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-binary-v1-${{ runner.os }}

      - name: Fetch Camoufox browser binary
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Start Xvfb virtual display
        # Camoufox needs a display even in "headless" mode.
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2

      - name: Run scraper
        run: python etl/extract_house_price.py

      - name: Commit & push scraped data
        if: always()   # commit even if scrape was partial
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.SCRAPE_FILE }}
          git diff --cached --quiet || git commit -m "Auto update property data (Scraped) [skip ci]"
          git pull origin main --rebase || true
          git push || true

  # ──────────────────────────────────────────────
  # JOB 2: Enrich (ABS, Crime, PTV)
  # ──────────────────────────────────────────────
  enrich:
    name: 2 - Enrich with ABS / Crime / PTV
    runs-on: ubuntu-latest
    needs: scrape
    if: success() || failure()   # still try to enrich even if scrape was partial
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install enrich dependencies
        run: pip install pandas requests openpyxl tqdm

      - name: Run enrichment
        run: |
          python etl/enrich_property_data.py \
            --input  ${{ env.SCRAPE_FILE }} \
            --output ${{ env.ENRICH_FILE }}

      - name: Commit & push enriched data
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.ENRICH_FILE }}
          git diff --cached --quiet || git commit -m "Auto update property data (Enriched) [skip ci]"
          git pull origin main --rebase || true
          git push || true