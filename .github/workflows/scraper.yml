name: Melbourne Property - Daily Scrape + Enrich

permissions:
  contents: write

on:
  schedule:
    - cron: "0 14 * * *"   # Daily 14:00 UTC = ~00:00/01:00 Melbourne (AEST/AEDT)
  workflow_dispatch:

env:
  SCRAPE_FILE:  data/melbourne_price_data.csv
  ENRICH_FILE:  data/melbourne_price_data_enriched.csv

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Daily batch scrape (14 cells/day, full coverage in 14 days)
  # ──────────────────────────────────────────────
  scrape:
    name: 1 - Scrape domain.com.au (daily batch)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HEADLESS: "true"
      PROXY_URL: ${{ secrets.PROXY_URL }}
      CELLS_PER_RUN: "14"
      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Xvfb system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 libdbus-glib-1-2 libxt6 \
            libasound2t64 libpangocairo-1.0-0 libxss1 \
            libnss3 libxtst6 libxrandr2 libdrm2 libgbm1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "camoufox[geoip]" pandas beautifulsoup4 numpy playwright

      - name: Cache Camoufox binary
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-binary-v1-${{ runner.os }}

      - name: Fetch Camoufox browser binary
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2

      - name: Run daily scraper
        run: python etl/extract_house_price_daily.py

      - name: Commit & push scraped data
        if: always()
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.SCRAPE_FILE }}
          git diff --cached --quiet || git commit -m "Auto update property data (Daily $(date -u +%Y-%m-%d)) [skip ci]"
          git pull origin main --rebase || true
          git push || true

  # ──────────────────────────────────────────────
  # JOB 2: Enrich — chạy bất kể job 1 success hay fail (trừ khi cancel)
  # ──────────────────────────────────────────────
  enrich:
    name: 2 - Enrich with ABS / Crime / PTV
    runs-on: ubuntu-latest
    needs: scrape
    if: always() && needs.scrape.result != 'cancelled'
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if Sunday (skip enrich on other days)
        id: check_day
        run: |
          if [ "$(date -u +%u)" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping enrich (not Sunday)"
          fi

      - name: Log scrape job status
        if: steps.check_day.outputs.should_run == 'true'
        run: |
          echo "📊 Scrape job result was: ${{ needs.scrape.result }}"
          if [ "${{ needs.scrape.result }}" = "failure" ]; then
            echo "⚠️  Scrape failed, but enriching existing data anyway"
          fi

      - name: Setup Python 3.11
        if: steps.check_day.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install enrich dependencies
        if: steps.check_day.outputs.should_run == 'true'
        run: pip install pandas requests openpyxl tqdm

      - name: Run enrichment
        if: steps.check_day.outputs.should_run == 'true'
        run: |
          python etl/enrich_property_data.py \
            --input  ${{ env.SCRAPE_FILE }} \
            --output ${{ env.ENRICH_FILE }}

      - name: Commit & push enriched data
        if: steps.check_day.outputs.should_run == 'true'
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.ENRICH_FILE }}
          git diff --cached --quiet || git commit -m "Auto update property data (Enriched weekly) [skip ci]"
          git pull origin main --rebase || true
          git push || true