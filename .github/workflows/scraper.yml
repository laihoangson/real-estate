name: Melbourne Property - Twice Daily Scrape

permissions:
  contents: write

on:
  schedule:
      # All cron entries below are in UTC. Melbourne time = UTC+10
      # (fixed offset, same convention as before — no DST adjustment).
      # Each day now has its own Run A / Run B pair, shifted by 1 hour
      # per day of the week: Sun 01:00/13:00 ... Sat 07:00/19:00.

      # Sunday (Melbourne) - Run A: 01:00, Run B: 13:00
      - cron: "0 15 * * 6"   # Run A -> Sun 01:00 Melbourne (fires Saturday 15:00 UTC)
      - cron: "0 3 * * 0"    # Run B -> Sun 13:00 Melbourne

      # Monday (Melbourne) - Run A: 02:00, Run B: 14:00
      - cron: "0 16 * * 0"   # Run A -> Mon 02:00 Melbourne (fires Sunday 16:00 UTC)
      - cron: "0 4 * * 1"    # Run B -> Mon 14:00 Melbourne

      # Tuesday (Melbourne) - Run A: 03:00, Run B: 15:00
      - cron: "0 17 * * 1"   # Run A -> Tue 03:00 Melbourne (fires Monday 17:00 UTC)
      - cron: "0 5 * * 2"    # Run B -> Tue 15:00 Melbourne

      # Wednesday (Melbourne) - Run A: 04:00, Run B: 16:00
      - cron: "0 18 * * 2"   # Run A -> Wed 04:00 Melbourne (fires Tuesday 18:00 UTC)
      - cron: "0 6 * * 3"    # Run B -> Wed 16:00 Melbourne

      # Thursday (Melbourne) - Run A: 05:00, Run B: 17:00
      - cron: "0 19 * * 3"   # Run A -> Thu 05:00 Melbourne (fires Wednesday 19:00 UTC)
      - cron: "0 7 * * 4"    # Run B -> Thu 17:00 Melbourne

      # Friday (Melbourne) - Run A: 06:00, Run B: 18:00
      - cron: "0 20 * * 4"   # Run A -> Fri 06:00 Melbourne (fires Thursday 20:00 UTC)
      - cron: "0 8 * * 5"    # Run B -> Fri 18:00 Melbourne

      # Saturday (Melbourne) - Run A: 07:00, Run B: 19:00
      - cron: "0 21 * * 5"   # Run A -> Sat 07:00 Melbourne (fires Friday 21:00 UTC)
      - cron: "0 9 * * 6"    # Run B -> Sat 19:00 Melbourne

  workflow_dispatch:
    inputs:
      offset:
        description: 'Cell group (0-13). Leave empty for auto, or "random"'
        required: false
        default: ''
        type: string

      run_slot:
        description: 'Run slot: A (first half) or B (second half)'
        required: false
        default: 'A'
        type: choice
        options:
          - A
          - B

      cells_per_run:
        description: 'Number of cells to scrape'
        required: false
        default: '7'
        type: string

env:
  SCRAPE_FILE: data/melbourne_price_data.csv
  ENRICH_FILE: data/melbourne_price_data_enriched.csv

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Twice-daily small batch scrape
  # ──────────────────────────────────────────────
  scrape:
    name: 1 - Scrape (7 cells, 10 pages each)
    runs-on: ubuntu-latest
    # 5h50m — MUST be larger than Python's RUN_TIMEOUT (5h20m) so the script
    # stops scraping and commits BEFORE GitHub kills the job. If both were equal,
    # GitHub kills mid-commit and data is lost (job shows "Cancelled").
    # Timeline: Python stops at 5h20m → commits by ~5h25m → YAML never reached.
    timeout-minutes: 350

    env:
      HEADLESS: "true"
      PROXY_URL: ${{ secrets.PROXY_URL }}
      CELLS_PER_RUN: ${{ inputs.cells_per_run || '7' }}
      MANUAL_OFFSET: ${{ inputs.offset || '' }}

      # Auto-detect run slot from cron schedule.
      # Run A schedules = early-Melbourne-morning crons (one per weekday).
      # Anything else (including all Run B schedules) defaults to 'B'.
      RUN_SLOT: ${{ inputs.run_slot || ( (github.event.schedule == '0 15 * * 6' || github.event.schedule == '0 16 * * 0' || github.event.schedule == '0 17 * * 1' || github.event.schedule == '0 18 * * 2' || github.event.schedule == '0 19 * * 3' || github.event.schedule == '0 20 * * 4' || github.event.schedule == '0 21 * * 5') && 'A' || 'B') }}

      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print run info
        run: |
          echo "📅 Date (UTC): $(date -u +%Y-%m-%d)"
          echo "🕐 Time (UTC): $(date -u +%H:%M)"
          echo "🅰️/🅱️ Run Slot: ${{ env.RUN_SLOT }}"
          echo "📦 Cells per run: ${{ env.CELLS_PER_RUN }}"
          echo "📌 Event name: ${{ github.event_name }}"
          echo "📌 Schedule: ${{ github.event.schedule }}"

      # ============================================
      # FIX: Pin Node.js 20 to avoid Node 24 incompatibility
      # with Playwright (TypeError: Cannot read properties of
      # undefined reading 'url' in pageError.location).
      # ============================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Xvfb system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 libdbus-glib-1-2 libxt6 \
            libasound2t64 libpangocairo-1.0-0 libxss1 \
            libnss3 libxtst6 libxrandr2 libdrm2 libgbm1

      # ============================================
      # FIX: Force upgrade Playwright + Camoufox to latest
      # versions that support Node 20+ properly.
      # ============================================
      - name: Install Python dependencies
        run: |
         pip install --upgrade pip
         # pin versions
         pip install "playwright==1.52.0"
         pip install "camoufox[geoip]==0.4.11"
         pip install pandas beautifulsoup4 numpy

      - name: Print Playwright + Camoufox versions
        run: |
          echo "Node version: $(node --version)"
          echo "Python version: $(python --version)"
          pip show playwright | grep -i version
          pip show camoufox | grep -i version

      - name: Cache Camoufox binary
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          # Bump cache version when upgrading Camoufox so the cached binary
          # doesn't get reused after a version bump.
          key: camoufox-binary-v3-${{ runner.os }}

      - name: Fetch Camoufox browser binary
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2

      - name: Run scraper
        run: python etl/extract_house_price.py

      - name: Commit & push scraped data
        if: always()
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"

          git add ${{ env.SCRAPE_FILE }}

          git diff --cached --quiet || \
            git commit -m "Scrape slot ${{ env.RUN_SLOT }} - $(date -u +%Y-%m-%d_%H%M) [skip ci]"

          git pull origin main --rebase || true
          git push || true

  # ──────────────────────────────────────────────
  # JOB 2: Daily enrich
  # Runs right after the day's Run B scrape, or on manual dispatch
  # ──────────────────────────────────────────────
  enrich:
    name: 2 - Enrich
    runs-on: ubuntu-latest
    needs: scrape
    if: always() && needs.scrape.result != 'cancelled'
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Decide if enrich should run
        id: check
        run: |

          echo "📌 Event name: ${{ github.event_name }}"
          echo "📌 Schedule: ${{ github.event.schedule }}"

          SHOULD_RUN="false"

          # Manual dispatch always allowed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN="true"
          fi

          # Daily Run B cron (second run of each Melbourne calendar day)
          # -> trigger enrich every day right after it
          case "${{ github.event.schedule }}" in
            "0 3 * * 0"|"0 4 * * 1"|"0 5 * * 2"|"0 6 * * 3"|"0 7 * * 4"|"0 8 * * 5"|"0 9 * * 6")
              SHOULD_RUN="true"
              ;;
          esac

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

          if [ "$SHOULD_RUN" = "true" ]; then
            echo "✅ Will run enrich"
          else
            echo "⏭️ Skipping enrich"
          fi

      - name: Setup Python 3.11
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install enrich dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install pandas requests openpyxl tqdm numpy

      - name: Run enrichment
        if: steps.check.outputs.should_run == 'true'
        run: |
          python etl/enrich_property_data.py \
            --input  ${{ env.SCRAPE_FILE }} \
            --output ${{ env.ENRICH_FILE }}

      - name: Commit & push enriched data
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"

          git add ${{ env.ENRICH_FILE }}

          git diff --cached --quiet || \
            git commit -m "Enrich daily - $(date -u +%Y-%m-%d) [skip ci]"

          git pull origin main --rebase || true
          git push || true