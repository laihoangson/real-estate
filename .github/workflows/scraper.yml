name: Melbourne Property - Twice Daily Scrape

permissions:
  contents: write

on:
  schedule:
    # Run A: 02:00 UTC daily = ~12:00-13:00 Melbourne (noon)
    - cron: "0 2 * * *"
    # Run B: 14:00 UTC daily = ~00:00-01:00 Melbourne (midnight)
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      offset:
        description: 'Cell group (0-13). Leave empty for auto, or "random"'
        required: false
        default: ''
        type: string
      run_slot:
        description: 'Run slot: A (first 7) or B (second 7)'
        required: false
        default: 'A'
        type: choice
        options:
          - A
          - B
      cells_per_run:
        description: 'Number of cells to scrape'
        required: false
        default: '7'
        type: string

env:
  SCRAPE_FILE:  data/melbourne_price_data.csv
  ENRICH_FILE:  data/melbourne_price_data_enriched.csv

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Twice-daily small batch scrape
  # ──────────────────────────────────────────────
  scrape:
    name: 1 - Scrape (7 cells)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      HEADLESS: "true"
      PROXY_URL: ${{ secrets.PROXY_URL }}
      CELLS_PER_RUN: ${{ inputs.cells_per_run || '7' }}
      MANUAL_OFFSET: ${{ inputs.offset || '' }}
      # Determine RUN_SLOT from cron schedule (02:00 UTC = A, 14:00 UTC = B)
      # Manual trigger uses input value
      RUN_SLOT: ${{ inputs.run_slot || (github.event.schedule == '0 2 * * *' && 'A' || 'B') }}
      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print run info
        run: |
          echo "📅 Date (UTC): $(date -u +%Y-%m-%d)"
          echo "🕐 Time (UTC): $(date -u +%H:%M)"
          echo "🅰️/🅱️ Run Slot: ${{ env.RUN_SLOT }}"
          echo "📦 Cells per run: ${{ env.CELLS_PER_RUN }}"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Xvfb system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 libdbus-glib-1-2 libxt6 \
            libasound2t64 libpangocairo-1.0-0 libxss1 \
            libnss3 libxtst6 libxrandr2 libdrm2 libgbm1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "camoufox[geoip]" pandas beautifulsoup4 numpy playwright

      - name: Cache Camoufox binary
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-binary-v1-${{ runner.os }}

      - name: Fetch Camoufox browser binary
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2

      - name: Run scraper
        run: python etl/extract_house_price.py

      - name: Commit & push scraped data
        if: always()
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.SCRAPE_FILE }}
          git diff --cached --quiet || git commit -m "Scrape slot ${{ env.RUN_SLOT }} - $(date -u +%Y-%m-%d_%H%M) [skip ci]"
          git pull origin main --rebase || true
          git push || true

  # ──────────────────────────────────────────────
  # JOB 2: Enrich — chỉ chạy Run B (đêm, sau khi đã có data cả ngày)
  # ──────────────────────────────────────────────
  enrich:
    name: 2 - Enrich
    runs-on: ubuntu-latest
    needs: scrape
    if: always() && needs.scrape.result != 'cancelled'
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Decide if enrich should run
        id: check
        run: |
          # Run enrich on:
          # - Sunday Run B (14:00 UTC) for weekly fresh enrich
          # - Manual trigger
          DOW=$(date -u +%u)
          HOUR=$(date -u +%H)
          IS_SUNDAY_NIGHT="false"
          if [ "$DOW" = "7" ] && [ "$HOUR" = "14" ]; then
            IS_SUNDAY_NIGHT="true"
          fi

          if [ "$IS_SUNDAY_NIGHT" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Will run enrich"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping enrich (only Sunday night or manual)"
          fi

      - name: Setup Python 3.11
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install enrich dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pip install pandas requests openpyxl tqdm

      - name: Run enrichment
        if: steps.check.outputs.should_run == 'true'
        run: |
          python etl/enrich_property_data.py \
            --input  ${{ env.SCRAPE_FILE }} \
            --output ${{ env.ENRICH_FILE }}

      - name: Commit & push enriched data
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"
          git add ${{ env.ENRICH_FILE }}
          git diff --cached --quiet || git commit -m "Enrich weekly - $(date -u +%Y-%m-%d) [skip ci]"
          git pull origin main --rebase || true
          git push || true