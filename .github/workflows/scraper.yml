name: Melbourne Property - Twice Daily Scrape (Rotating Hour)

permissions:
  contents: write

on:
  # Checks every hour; the actual job only runs at the target hour for that day (see "Compute target hour" step)
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      offset:
        description: 'Cell group (0-13). Leave empty for auto, or "random"'
        required: false
        default: ''
        type: string

      run_slot:
        description: 'Run slot: A (first half) or B (second half)'
        required: false
        default: 'A'
        type: choice
        options:
          - A
          - B

      cells_per_run:
        description: 'Number of cells to scrape'
        required: false
        default: '7'
        type: string

env:
  SCRAPE_FILE: data/melbourne_price_data.csv
  ENRICH_FILE: data/melbourne_price_data_enriched.csv

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Scrape — runs at the target hour, which shifts +1h each day and resets every 7 days
  # ──────────────────────────────────────────────
  scrape:
    name: 1 - Scrape (7 cells, 10 pages each)
    runs-on: ubuntu-latest
    # 5h50m — MUST be larger than Python's RUN_TIMEOUT (5h20m) so the script
    # stops scraping and commits BEFORE GitHub kills the job. If both were equal,
    # GitHub kills mid-commit and data is lost (job shows "Cancelled").
    # Timeline: Python stops at 5h20m → commits by ~5h25m → YAML never reached.
    timeout-minutes: 350

    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      run_slot: ${{ steps.gate.outputs.run_slot }}

    env:
      HEADLESS: "true"
      PROXY_URL: ${{ secrets.PROXY_URL }}
      CELLS_PER_RUN: ${{ inputs.cells_per_run || '7' }}
      MANUAL_OFFSET: ${{ inputs.offset || '' }}
      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================
      # Rotating hour logic:
      # Base run hours: 02:00 UTC (slot A) and 14:00 UTC (slot B).
      # Each day shifts +1h from the base; OFFSET = day_number mod 7.
      # → After 7 days, offset resets to 0 (cycle repeats).
      # Since the workflow checks every hour (hourly cron), this step decides
      # whether the current hour matches today's target hour — if not,
      # all heavy steps below are skipped.
      # ============================================
      - name: Compute target hour (rotate +1h/day, reset every 7 days)
        id: gate
        run: |
          CURRENT_HOUR=$(date -u +%H)
          DAY_INDEX=$(( $(date -u +%s) / 86400 ))
          OFFSET=$(( DAY_INDEX % 7 ))
          TARGET_A=$(printf '%02d' $(( (2  + OFFSET) % 24 )))
          TARGET_B=$(printf '%02d' $(( (14 + OFFSET) % 24 )))

          echo "📅 Date (UTC): $(date -u +%Y-%m-%d)"
          echo "🕐 Current hour (UTC): $CURRENT_HOUR"
          echo "🔄 Day index: $DAY_INDEX | Offset (mod 7): $OFFSET"
          echo "🎯 Target A: $TARGET_A:00 UTC | Target B: $TARGET_B:00 UTC"
          echo "📌 Event name: ${{ github.event_name }}"

          SHOULD_RUN="false"
          RUN_SLOT=""

          if [ "$CURRENT_HOUR" = "$TARGET_A" ]; then
            SHOULD_RUN="true"
            RUN_SLOT="A"
          fi

          if [ "$CURRENT_HOUR" = "$TARGET_B" ]; then
            SHOULD_RUN="true"
            RUN_SLOT="B"
          fi

          # Manual dispatch always runs, using the run_slot selected by the user
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN="true"
            RUN_SLOT="${{ inputs.run_slot || 'A' }}"
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "run_slot=$RUN_SLOT" >> $GITHUB_OUTPUT

          if [ "$SHOULD_RUN" = "true" ]; then
            echo "✅ Will run scrape (slot $RUN_SLOT)"
          else
            echo "⏭️ Not target hour — skipping scrape"
          fi

      - name: Print run info
        if: steps.gate.outputs.should_run == 'true'
        run: |
          echo "🅰️/🅱️ Run Slot: ${{ steps.gate.outputs.run_slot }}"
          echo "📦 Cells per run: ${{ env.CELLS_PER_RUN }}"

      # ============================================
      # FIX: Pin Node.js 20 to avoid Node 24 incompatibility
      # with Playwright (TypeError: Cannot read properties of
      # undefined reading 'url' in pageError.location).
      # ============================================
      - name: Setup Node.js 20
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Xvfb system dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 libdbus-glib-1-2 libxt6 \
            libasound2t64 libpangocairo-1.0-0 libxss1 \
            libnss3 libxtst6 libxrandr2 libdrm2 libgbm1

      # ============================================
      # FIX: Force upgrade Playwright + Camoufox to latest
      # versions that support Node 20+ properly.
      # ============================================
      - name: Install Python dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
         pip install --upgrade pip
         # pin versions
         pip install "playwright==1.52.0"
         pip install "camoufox[geoip]==0.4.11"
         pip install pandas beautifulsoup4 numpy

      - name: Print Playwright + Camoufox versions
        if: steps.gate.outputs.should_run == 'true'
        run: |
          echo "Node version: $(node --version)"
          echo "Python version: $(python --version)"
          pip show playwright | grep -i version
          pip show camoufox | grep -i version

      - name: Cache Camoufox binary
        id: cache-camoufox
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          # Bump cache version when upgrading Camoufox so the cached binary
          # doesn't get reused after a version bump.
          key: camoufox-binary-v3-${{ runner.os }}

      - name: Fetch Camoufox browser binary
        if: steps.gate.outputs.should_run == 'true' && steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Start Xvfb virtual display
        if: steps.gate.outputs.should_run == 'true'
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2

      - name: Run scraper
        if: steps.gate.outputs.should_run == 'true'
        run: python etl/extract_house_price.py

      - name: Commit & push scraped data
        if: always() && steps.gate.outputs.should_run == 'true'
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"

          git add ${{ env.SCRAPE_FILE }}

          git diff --cached --quiet || \
            git commit -m "Scrape slot ${{ steps.gate.outputs.run_slot }} - $(date -u +%Y-%m-%d_%H%M) [skip ci]"

          git pull origin main --rebase || true
          git push || true

  # ──────────────────────────────────────────────
  # JOB 2: Enrich — runs daily, immediately after a real scrape occurs
  # ──────────────────────────────────────────────
  enrich:
    name: 2 - Enrich
    runs-on: ubuntu-latest
    needs: scrape
    # Only runs if the scrape job actually hit the target hour for that day
    # (i.e. not one of the 23 skipped hourly checks), and scrape was not fully cancelled.
    if: always() && needs.scrape.outputs.should_run == 'true' && needs.scrape.result != 'cancelled'
    timeout-minutes: 60

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Print run info
        run: |
          echo "📅 Date (UTC): $(date -u +%Y-%m-%d)"
          echo "🅰️/🅱️ Slot just scraped: ${{ needs.scrape.outputs.run_slot }}"
          echo "✅ Enrich runs daily immediately after scrape"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install enrich dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests openpyxl tqdm numpy

      - name: Run enrichment
        run: |
          python etl/enrich_property_data.py \
            --input  ${{ env.SCRAPE_FILE }} \
            --output ${{ env.ENRICH_FILE }}

      - name: Commit & push enriched data
        run: |
          git config --global user.name "laihoangson"
          git config --global user.email "lson21757@gmail.com"

          git add ${{ env.ENRICH_FILE }}

          git diff --cached --quiet || \
            git commit -m "Enrich daily - $(date -u +%Y-%m-%d) [skip ci]"

          git pull origin main --rebase || true
          git push || true