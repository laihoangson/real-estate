name: Production Update

on:
  schedule:
    # Sunday 20:00 UTC = Monday 06:00-07:00 Melbourne (AEST/AEDT).
    # This runs AFTER the daily scrape (14:00 UTC) and enrich (Sunday only) finish,
    # ensuring the model trains on the latest data.
    - cron: '0 20 * * 0'
  workflow_dispatch:    # allow manual trigger from the Actions tab

jobs:
  weekly-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify input CSV exists
        run: |
          if [ ! -f "data/melbourne_price_data_enriched.csv" ]; then
            echo "::error::Input CSV not found at data/melbourne_price_data_enriched.csv"
            exit 1
          fi
          echo "Input CSV size: $(du -h data/melbourne_price_data_enriched.csv | cut -f1)"
          echo "Latest Last_Updated in input:"
          python -c "import pandas as pd; df = pd.read_csv('data/melbourne_price_data_enriched.csv'); print(df['Last_Updated'].max())"

      - name: Run update pipeline
        run: python production/production_update.py

      - name: Show metrics summary
        run: |
          if [ -f "production/output/models/metrics.json" ]; then
            echo "=== Metrics summary ==="
            cat production/output/models/metrics.json
          fi

      - name: Commit and push updated outputs
        run: |
          git config user.name  "laihoangson"
          git config user.email "lson21757@gmail.com"
          git add production/output/cleaned_data.parquet \
                  production/output/eda_decisions.json \
                  production/output/predictions_for_sale.parquet \
                  production/output/predictions_for_sale.csv \
                  production/output/models/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Production update: $(TZ='Australia/Melbourne' date +'%Y-%m-%d %H:%M %Z')"
            git pull origin main --rebase || true
            git push
          fi

      - name: Upload logs as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: production/output/logs/
          retention-days: 14